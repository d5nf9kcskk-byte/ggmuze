<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 678">
  <!-- Teal background section -->
  <rect width="512" height="512" fill="#0d7e8e"/>
  <!-- White section (text area) -->
  <rect y="512" width="512" height="166" fill="#ffffff"/>

  <!-- White outer triangle (sail) -->
  <polygon points="256,36 469,478 43,478" fill="#ffffff"/>
  <!-- Subtle right-face shadow for depth -->
  <polygon points="256,36 469,478 363,478" fill="#d8eef0" opacity="0.45"/>

  <!-- Gold inner triangle -->
  <polygon points="256,264 349,478 163,478" fill="#c8a52a"/>

  <!-- Purple wavy lines (3) -->
  <path d="M15,488 C80,470 160,506 256,488 C352,470 432,506 497,488"
        stroke="#7b3578" stroke-width="13" fill="none" stroke-linecap="round"/>
  <path d="M15,510 C80,492 160,528 256,510 C352,492 432,528 497,510"
        stroke="#7b3578" stroke-width="13" fill="none" stroke-linecap="round"/>
  <path d="M15,532 C80,514 160,550 256,532 C352,514 432,550 497,532"
        stroke="#7b3578" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- NWSA text -->
  <text x="238" y="624" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700" font-size="68" letter-spacing="32"
        fill="#1a3d50">NWSA</text>
</svg>
