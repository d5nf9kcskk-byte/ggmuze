<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Full-bleed background so the platform mask (maskable) has something to crop. -->
  <rect width="512" height="512" fill="#1e3a5f"/>
  <!-- Beamed eighth notes, centered within the maskable safe zone. -->
  <g fill="#ffffff">
    <!-- note heads -->
    <ellipse cx="185" cy="360" rx="58" ry="44" transform="rotate(-20 185 360)"/>
    <ellipse cx="330" cy="335" rx="58" ry="44" transform="rotate(-20 330 335)"/>
    <!-- stems -->
    <rect x="233" y="150" width="22" height="212" rx="6"/>
    <rect x="378" y="125" width="22" height="212" rx="6"/>
    <!-- beam -->
    <polygon points="233,150 400,125 400,168 233,193"/>
  </g>
</svg>
